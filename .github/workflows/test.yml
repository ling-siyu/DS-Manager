name: test

on:
  push:
    branches: [main, ai-native-rebuild]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
    defaults:
      run:
        # Deps and the test suite live in design-system/, not the repo root.
        working-directory: design-system
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: design-system/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        # Built-in node:test runner; no Chrome/network needed (pixel diffs use fixtures).
        run: npm test
