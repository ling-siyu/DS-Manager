<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DSM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ui/styles.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar-brand">
        <span class="topbar-project">DSM</span>
        <h1 class="topbar-title">Design System Manager</h1>
      </div>

      <div class="toolbar">
        <label class="search">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input id="search" type="search" placeholder="Search tokens &amp; components">
        </label>
      </div>
    </header>

    <div class="workspace">
      <aside class="sidebar-card">
        <div class="sidebar-head">
          <h2>Asset Levels</h2>
        </div>

        <nav class="level-nav" id="level-nav" aria-label="Asset levels"></nav>
      </aside>

      <main class="content" id="panels"></main>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite">Copied</div>

  <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
  <script type="module" src="/ui/app.js"></script>
</body>
</html>
