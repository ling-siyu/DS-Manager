<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DSM UI Preview</title>
  <link rel="stylesheet" href="/ui/styles.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <h1 class="topbar-title">Design System Manager</h1>

      <div class="toolbar">
        <label class="search">
          <span aria-hidden="true">Search</span>
          <input id="search" type="search" placeholder="Search tokens, variables, components, or composition">
        </label>
      </div>
    </header>

    <div class="workspace">
      <aside class="sidebar-card">
        <div class="sidebar-head">
          <h2>Asset Levels</h2>
          <p class="sidebar-copy">
            Sidebar navigation follows derived composition depth. Edit <span class="mono">components.json</span> to adjust the graph.
          </p>
        </div>

        <nav class="level-nav" id="level-nav" aria-label="Asset levels"></nav>

        <div class="sidebar-note">
          <strong>Level rule</strong>
          <p class="sidebar-copy">
            Leaf components default to Lv.1. A component that contains Lv.1 parts becomes Lv.2, and the chain continues upward.
          </p>
        </div>
      </aside>

      <main class="content" id="panels"></main>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite">Copied</div>

  <script type="module" src="/ui/app.js"></script>
</body>
</html>
